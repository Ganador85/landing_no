services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: takfornying
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload -d takfornying"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?set PAYLOAD_SECRET}
      DATABASE_URL: postgres://payload:payload@db:5432/takfornying
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      LEAD_FROM_EMAIL: ${LEAD_FROM_EMAIL:-leads@takfornying.no}
      LEAD_TO_EMAIL: ${LEAD_TO_EMAIL:-post@takfornying.no}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
